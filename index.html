<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://picsum.photos/192" />
    <title>GAFFER 2.0</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      eruda.init();
      window.addEventListener('load', function() {
        var wrapper = document.querySelector('#root > div');
        var cs = getComputedStyle(wrapper);
        var info = [
          'VIEWPORT: ' + window.innerWidth + 'x' + window.innerHeight,
          'DEVICE PIXEL RATIO: ' + window.devicePixelRatio,
          'WRAPPER W: ' + wrapper.offsetWidth,
          'WRAPPER SCROLL W: ' + wrapper.scrollWidth,
          'WRAPPER MAX-W: ' + cs.maxWidth,
          'WRAPPER POSITION: ' + cs.position,
          'BODY SCROLL W: ' + document.body.scrollWidth,
          'HTML SCROLL W: ' + document.documentElement.scrollWidth,
          'OVERFLOW-X: ' + cs.overflowX,
        ];
        info.forEach(function(line) { console.log(line); });
      });
    </script>
  </body>
</html>
